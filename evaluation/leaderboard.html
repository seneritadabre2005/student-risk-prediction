<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        .container {
            margin: 40px auto;
            width: 70%;
            background: white;
            color: black;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2a5298;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .rank-1 {
            background: #ffd700 !important;
            font-weight: bold;
        }

        .rank-2 {
            background: #c0c0c0 !important;
        }

        .rank-3 {
            background: #cd7f32 !important;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #ddd;
        }
    </style>
</head>

<body>

<h1>🏆 Live Leaderboard</h1>

<div class="container">
    <table id="leaderboard"></table>
</div>

<div class="footer">
    Auto-updated after each submission 🚀
</div>

<script>
fetch("leaderboard.csv")
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n");
    let table = document.getElementById("leaderboard");

    rows.forEach((row, index) => {

        let cols = row.split(",");
        let tr = document.createElement("tr");

        // Highlight top 3
        if (index === 1) tr.classList.add("rank-1");
        if (index === 2) tr.classList.add("rank-2");
        if (index === 3) tr.classList.add("rank-3");

        cols.forEach((col, i) => {
            let cell = document.createElement(index === 0 ? "th" : "td");

            // Add rank column
            if (i === 0 && index !== 0) {
                cell.innerText = index;  // Rank number
            } else {
                cell.innerText = col;
            }

            tr.appendChild(cell);
        });

        table.appendChild(tr);
    });
});
</script>

</body>
</html>
